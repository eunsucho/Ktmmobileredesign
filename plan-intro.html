<style>
/* ==========================================
   BASE RESET & TOKENS
   ========================================== */
* { box-sizing: border-box; }
:root {
  --kt-red: #FF0000;
  --kt-text: #1a1a1a;
  --kt-line: #e5e5e5;
  --kt-bg-soft: #f7f7f7;
  --color-primary: #FF0000;
  --color-primary-light: #FFE5E5;
  --color-green: #0F6E56;
  --color-green-light: #EAF3DE;
  --color-amber: #633806;
  --color-amber-light: #FAEEDA;
  --color-border-primary: #FF0000;
  --color-border-tertiary: #E5E5E5;
  --color-text-secondary: #666;
  --color-background-secondary: #F5F5F5;
  --kt-cyan: #00c7b5;
}
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  color: var(--kt-text);
  background: #fff;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  letter-spacing: -0.01em;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }

/* ==========================================
   LAYOUT & PAGE TITLE
   ========================================== */
.kt-page-title-wrap { max-width: 1280px; margin: 0 auto; padding: 40px 20px 20px; }
.kt-bcrumb { font-size: 13px; color: #bbb; margin-bottom: 10px; }
.kt-bcrumb .cur { color: #555; font-weight: 700; }
.kt-page-title { font-size: 32px; font-weight: 800; margin: 0 0 6px; }
.kt-page-sub { font-size: 14px; color: #999; margin: 0; }

.kt-layout {
  max-width: 1280px; margin: 0 auto; padding: 0 20px 100px;
  display: flex; gap: 32px; align-items: flex-start;
}
.kt-main { flex: 1; min-width: 0; }
.kt-side { width: 340px; flex-shrink: 0; position: sticky; top: 100px; }

/* ==========================================
   TABS & FILTERS
   ========================================== */
.network-tabs {
  display: flex; justify-content: center; gap: 40px;
  border-bottom: 1px solid var(--kt-line); margin-bottom: 32px;
}
.network-tab {
  padding: 12px 20px; font-size: 18px; font-weight: 700; color: #888;
  border-bottom: 3px solid transparent; transition: all 0.2s;
}
.network-tab.active { color: #111; border-bottom-color: #111; }

.intent-filter-wrap { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.intent-pill {
  padding: 10px 20px; border-radius: 999px; font-size: 15px; font-weight: 700;
  background: var(--color-background-secondary); color: var(--color-text-secondary);
  transition: all 0.2s; border: 1px solid transparent;
}
.intent-pill.active { background: var(--color-primary); color: #fff; }

.usage-filter-wrap {
  position: sticky; top: 90px; z-index: 40;
  background: #fff; border-bottom: 1px solid #f0f0f0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  display: flex; align-items: stretch; height: 54px;
  margin: 0 0 24px;
}
.usage-filter-logo {
  width: 60px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid #f0f0f0; margin-right: 0;
}
.usage-filter-logo-sq {
  width: 34px; height: 34px; background: #E60012; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.usage-chip {
  flex: 1; height: 54px; border-radius: 0;
  font-size: 14px; font-weight: 700;
  background: #fff; border: none; border-right: 1px solid #f0f0f0;
  color: #666; transition: background 0.15s, color 0.15s;
  letter-spacing: -0.02em;
}
.usage-chip:last-child { border-right: none; }
.usage-chip:hover { background: #f5f5f5; color: #333; }
.usage-chip.active { background: #111; color: #fff; }

/* ==========================================
   PLAN GROUPS (ACCORDION)
   ========================================== */
.plan-group { border-bottom: 1px solid #f0f0f0; }
.plan-group:last-child { border-bottom: none; }

.pg-header-row {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 28px 0;
  gap: 16px;
}
.pg-header-left { display: flex; align-items: center; gap: 14px; }
.pg-title {
  font-size: 22px; font-weight: 800; margin: 0;
  color: #111; letter-spacing: -0.04em;
}
.pg-count-badge {
  display: inline-flex; align-items: center;
  background: #f0f0f0; color: #666;
  font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 999px;
}
.pg-chevron {
  color: #bbb;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), color 0.2s;
  flex-shrink: 0;
}
.pg-header-row:hover .pg-chevron { color: #185fa5; }

.pg-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.pg-tab {
  padding: 7px 16px; border-radius: 999px;
  background: #f5f5f5; color: #888;
  font-size: 13px; font-weight: 700;
  transition: all 0.2s; border: 1.5px solid transparent;
}
.pg-tab:hover { color: #444; background: #ebebeb; }
.pg-tab.active { background: #111; color: #fff; }

/* ==========================================
   PLAN GRID
   ========================================== */
.plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

/* ==========================================
   PLAN CARD UI
   ========================================== */
.plan-card {
  background: #fff; border: 1px solid var(--color-border-tertiary);
  border-radius: 14px; padding: 16px; display: flex; flex-direction: column;
  position: relative; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  cursor: pointer;
}
.plan-card:hover { border-color: var(--color-border-primary); box-shadow: 0 6px 20px rgba(24,95,165,0.08); transform: translateY(-2px); }
.plan-card.added { border: 2px solid var(--color-primary); }

.pc-reco-badge {
  position: absolute; top: -10px; right: 14px;
  background: #111; color: #fff; font-size: 10px; font-weight: 800;
  padding: 3px 8px; border-radius: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

.pc-top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.pc-data-huge { font-size: 28px; font-weight: 900; color: #111; letter-spacing: -0.04em; }
.pc-data-huge span { font-size: 15px; font-weight: 800; }
.pc-price-huge { font-size: 20px; font-weight: 900; color: var(--kt-red); letter-spacing: -0.02em; }
.pc-price-huge span { font-size: 12px; font-weight: 700; color: #888; margin-left: 2px; }

.pc-base-data-note { font-size: 11px; color: #047857; font-weight: 700; margin-bottom: 6px; }

.pg-data-group { margin-bottom: 28px; }
.pg-data-group:last-child { margin-bottom: 4px; }
.pg-data-label {
  font-size: 13px; font-weight: 800; color: #aaa;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid #f5f5f5;
}
.pg-data-count { font-size: 11px; font-weight: 600; color: #ccc; }
.pc-title-row { margin-bottom: 12px; }
.pc-title { font-size: 14px; font-weight: 800; color: #111; line-height: 1.3; margin: 0 0 4px; word-break: keep-all; }
.pc-speed-txt { font-size: 12px; font-weight: 600; color: #666; }
.pc-speed-txt.alert { color: #A32D2D; }
.pc-promo-txt { font-size: 11px; color: var(--color-green); font-weight: 700; margin-top: 2px; }
.pc-promo-badge { display: inline-block; background: #E6F9F4; color: #047857; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-top: 3px; }

.pc-divider { height: 1px; background: #f0f0f0; margin: 0 0 12px; }

.pc-partner-logos { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.pc-partner-logo-sq {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  border: 1px solid rgba(0,0,0,0.06);
}
.pc-benefit-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; min-height: 24px; }
.pc-benefit-chip {
  font-size: 11px; font-weight: 700; color: #555;
  background: #f5f5f5; border-radius: 999px; padding: 3px 9px;
}

.pc-add-btn {
  width: 100%; padding: 10px; border-radius: 8px; margin-top: auto;
  font-size: 12px; font-weight: 800; text-align: center; transition: all 0.2s;
  border: 1px solid var(--color-border-tertiary); color: #444; background: #fff;
}
.pc-add-btn:hover { background: #f9f9f9; }
.pc-add-btn.added { background: var(--color-primary-light); color: var(--color-primary); border-color: var(--color-primary-light); }
.pc-add-btn.added:hover { background: #FFE5E5; } /* Updated hover for red theme */

/* ==========================================
   COMPARE BOARD
   ========================================== */
.comp-intro-label {
  font-size: 13px; font-weight: 800; color: #555;
  padding: 0 4px 10px; letter-spacing: -0.02em;
}
.comp-board { background: #fff; border: 1px solid var(--color-border-tertiary); border-radius: 16px; overflow: hidden; position: sticky; top: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
.comp-header { padding: 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.comp-title { font-size: 16px; font-weight: 800; }
.comp-count { font-size: 13px; color: #888; font-weight: 600; }

.comp-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 16px; border-bottom: 1px solid #f0f0f0; }
.comp-slot {
  padding: 24px 6px 16px; border: 1px solid #e5e5e5; border-radius: 12px; display: flex; flex-direction: column; align-items: center; position: relative; background: #fff; text-align: center;
}
.comp-slot.empty {
  justify-content: center; color: #aaa; font-size: 12px; font-weight: 600;
  border: 1px dashed #ddd; background: #fafafa; padding: 40px 6px;
}

.cs-info { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
.cs-row { display: flex; flex-direction: column; gap: 2px; }
.cs-label { font-size: 11px; color: #aaa; font-weight: 600; }

.cs-data { font-size: 17px; font-weight: 900; line-height: 1.2; word-break: keep-all; color: #111; }
.cs-price { font-size: 15px; font-weight: 800; color: var(--kt-red); }
.cs-speed, .cs-call { font-size: 12px; font-weight: 700; color: #555; }
.cs-benefit-logo { width: 28px; height: 28px; border-radius: 6px; display: grid; place-items: center; font-size: 14px; margin: 0 auto; border: 1px solid #eee; }

.cs-extra-section {
  width: 100%; border-top: 1px solid #f0f0f0; padding-top: 10px; margin-top: 4px;
  display: flex; flex-direction: column; gap: 7px;
}
.cs-extra-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
.cs-extra-label { font-size: 11px; color: #aaa; font-weight: 600; flex-shrink: 0; }
.cs-extra-val { font-size: 11px; font-weight: 700; color: #333; text-align: right; }
.cs-extra-good { color: #047857; }
.cs-extra-na { color: #bbb; }

.cs-del-btn {
  position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: #f5f5f5;
  display: grid; place-items: center; color: #888; font-size: 10px; font-weight: bold; transition: 0.2s;
}
.cs-del-btn:hover { background: #e0e0e0; color: #333; }

.highlight-marker {
  background: linear-gradient(180deg, rgba(255,255,255,0) 50%, #ffe066 50%);
  padding: 0 4px; display: inline-block;
}

.comp-action { padding: 16px; background: #fafafa; border-top: 1px solid #f0f0f0; }
.comp-search-wrap { display: flex; flex-direction: column; gap: 8px; }
.comp-search-input-box { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; overflow: hidden; transition: 0.2s; }
.comp-search-input-box:focus-within { border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-light); }
.comp-search-input { width: 100%; padding: 12px 0; font-size: 14px; border: none; outline: none; }
.comp-search-btn { font-size: 16px; color: #888; padding: 8px; }
.comp-search-result { background: #fff; border: 1px solid var(--color-primary); border-radius: 8px; padding: 12px; font-size: 13px; color: #333; line-height: 1.4; word-break: keep-all; box-shadow: 0 2px 8px rgba(255,0,0,0.1); }
.comp-search-result strong { color: var(--color-primary); }

/* ==========================================
   MODAL (상세 페이지)
   ========================================== */
.kt-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  z-index: 1000; display: grid; place-items: center;
  padding: 20px; animation: kt-fade-bg .2s ease;
}
@keyframes kt-fade-bg { from{opacity:0} to{opacity:1} }
.kt-modal {
  background: #fff; width: min(840px, 100%); max-height: 90vh;
  border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
  animation: kt-pop .25s ease; position: relative;
}
@keyframes kt-pop {
  from{opacity:0;transform:translateY(12px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.kt-modal-header {
  padding: 30px 40px 20px; display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0;
}
.kt-modal-title { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -0.03em; color: #111; }
.kt-modal-close {
  width: 32px; height: 32px; display: grid; place-items: center; font-size: 20px;
  color: #666; cursor: pointer; transition: 0.2s; border-radius: 50%;
}
.kt-modal-close:hover { background: #f0f0f0; color: #000; }
.kt-modal-scroll { overflow-y: auto; flex: 1; padding-bottom: 40px; }

/* Modal Summary Box */
.kt-mdl-sumbox {
  margin: 0 40px 24px; border: 1px solid #e5e5e5; border-radius: 16px; overflow: hidden; background: #fff;
}
.kt-mdl-icons {
  display: grid; grid-template-columns: repeat(4, 1fr); padding: 24px 10px; border-bottom: 1px solid #f0f0f0;
}
.kt-mdl-icon-item {
  display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 8px; position: relative;
}
.kt-mdl-icon-item:not(:last-child)::after {
  content: ''; position: absolute; right: 0; top: 10%; height: 80%; width: 1px; background: #eee;
}
.kt-mdl-icon-svg { margin-bottom: 12px; color: #ccc; }
.kt-mdl-val { font-size: 15px; font-weight: 800; color: #111; margin-bottom: 6px; line-height: 1.3; }
.kt-mdl-val-badge { display: inline-block; background: var(--kt-cyan); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; vertical-align: top; margin-right: 4px;}
.kt-mdl-sub { font-size: 11.5px; color: #888; line-height: 1.4; word-break: keep-all; }

/* Modal Pricing Row */
.kt-mdl-price-row {
  display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; background: #fafafa;
}
.kt-mdl-price-left { display: flex; align-items: center; gap: 12px; }
.kt-mdl-price-lbl { font-size: 13px; color: #666; font-weight: 600; }
.kt-mdl-price-strike { font-size: 14px; color: #aaa; text-decoration: line-through; }
.kt-mdl-price-right { display: flex; align-items: baseline; gap: 12px; }
.kt-mdl-price-pro-lbl { font-size: 14px; font-weight: 800; color: #111; }
.kt-mdl-price-pro-val { font-size: 26px; font-weight: 900; color: var(--kt-red); }
.kt-mdl-price-pro-val span { font-size: 15px; margin-left: 2px; }

/* Modal Action Buttons */
.kt-mdl-btns { display: flex; gap: 12px; margin: 0 40px 32px; }
.kt-mdl-btn {
  flex: 1; padding: 18px; border-radius: 999px; font-size: 16px; font-weight: 800;
  text-align: center; color: #fff; background: var(--kt-cyan);
  transition: background 0.2s; box-shadow: 0 4px 12px rgba(0, 199, 181, 0.2);
}
.kt-mdl-btn:hover { background: #00b0a0; }

/* Modal Tabs */
.kt-mdl-tabs { display: flex; border-bottom: 1px solid #ddd; margin: 0 40px 30px; }
.kt-mdl-tab {
  flex: 1; text-align: center; padding: 16px; font-size: 15px; font-weight: 800;
  color: #888; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.2s;
}
.kt-mdl-tab.active { color: #111; border-bottom-color: #111; }

/* Modal Content Area */
.kt-mdl-content { padding: 0 40px; }
.kt-mdl-sec-title { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 16px; }

/* 4-Column Graphic Cards (Additional Services) */
.kt-svc-4grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 40px; }
.kt-svc-card {
  background: #fdfdfd; border: 1px solid #eaeaea; border-radius: 12px;
  padding: 24px 16px; text-align: center; display: flex; flex-direction: column;
  align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: 0.2s;
}
.kt-svc-card:hover { border-color: #ccc; transform: translateY(-2px); }
.kt-svc-icon-wrap {
  width: 48px; height: 48px; border-radius: 50%; background: #f4f4f4;
  display: grid; place-items: center; margin-bottom: 16px; font-size: 20px;
}
.kt-svc-title { font-size: 14px; font-weight: 800; color: #111; margin-bottom: 8px; word-break: keep-all; line-height: 1.3; }
.kt-svc-title.red { color: var(--kt-red); }
.kt-svc-desc { font-size: 12px; color: #666; line-height: 1.45; word-break: keep-all; }
.kt-svc-desc.red { color: var(--kt-red); font-weight: 600; }
.kt-svc-link { font-size: 11px; color: var(--kt-cyan); font-weight: 700; margin-top: 6px; text-decoration: underline; cursor: pointer; }

/* Accordion Component */
.kt-acc-wrap { border-top: 1px solid #111; }
.kt-acc-item { border-bottom: 1px solid #eee; }
.kt-acc-head {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; font-size: 16px; font-weight: 800; color: #111; cursor: pointer;
}
.kt-acc-chevron { transition: transform 0.3s; color: #888; }
.kt-acc-head[aria-expanded="true"] .kt-acc-chevron { transform: rotate(180deg); }
.kt-acc-body { padding: 0 0 24px 0; font-size: 13px; color: #555; line-height: 1.6; display: none; }
.kt-acc-head[aria-expanded="true"] + .kt-acc-body { display: block; }
.kt-acc-box { background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 16px; }
.kt-acc-list { margin: 0; padding-left: 20px; list-style-type: disc; }
.kt-acc-list li { margin-bottom: 6px; }

@media (max-width: 1024px) {
  .kt-layout { flex-direction: column; }
  .kt-side { width: 100%; position: static; }
  .plan-grid { grid-template-columns: repeat(2, 1fr); }
  .kt-svc-4grid { grid-template-columns: repeat(2,1fr); }
  .kt-mdl-icons { grid-template-columns: repeat(2, 1fr); gap: 16px 0; }
  .kt-mdl-icon-item:nth-child(2)::after { display: none; }
  .kt-mdl-price-row { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* =============================================
   1. RAW DATA & NORMALIZATION CONSTANTS

/* ─── 파싱 및 정규화 함수 ─── */
function classifyPlan(plan) {
  const name = plan.familyName;
  if (name.includes("키즈")) return "kids";
  if (name.includes("시니어")) return "senior";
  if (name.includes("복지")) return "welfare";
  if (name.includes("통화")) return "voice";
  if (name.includes("5G")) return "5g";
  return "general";
}

function parseDataRaw(dataRaw) {
  if (!dataRaw) return { speedAfter: null, isDaily: false };
  const isDaily = dataRaw.includes("일");
  const parts = dataRaw.split("+");
  let speedAfter = parts.length > 1 ? parts.slice(1).join(" + ") : null;
  if (speedAfter && speedAfter.includes("최대")) {
    speedAfter = speedAfter.replace("최대", "").trim();
  }
  return { speedAfter, isDaily };
}

function calculatePromoGB(name, vol) {
  if (name.includes("7GB") && vol === 7) return 15;
  if (name.includes("10GB") && vol === 10) return 20;
  if (name.includes("15GB") && vol === 15) return 20;
  if (name.includes("11GB") && vol === 11) return 71;
  return 0;
}

function parseCallBasic(name) {
  if (name.includes('100분')) return '100분';
  if (name.includes('200분')) return '200분';
  if (name.includes('300분')) return '300분';
  if (name.includes('50분')) return '50분';
  return '무제한';
}

function getBenefitConfig(label) {
  const match = Object.keys(BENEFIT_COLOR).find(k => label.includes(k));
  return BENEFIT_COLOR[match] || BENEFIT_COLOR["default"];
}

// 괄호 안의 불필요한 영어 등을 제거 (예: 밀리의 서재 FREE -> 밀리의 서재)
function cleanPlanName(name) {
  return name.replace(/\s*\(.*?\)\s*/g, '').trim();
}

function SvgIcon({ type }) {
  const b = { width:32, height:32, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:1.5 };
  switch(type) {
    case 'data': return <svg {...b}><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16"/></svg>;
    case 'call': return <svg {...b}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    case 'msg': return <svg {...b}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
    case 'gift': return <svg {...b}><rect x="3" y="8" width="18" height="12" rx="1"/><path d="M12 8v12M19 8c0-2.21-1.79-4-4-4-1.25 0-2.37.57-3 1.47C11.37 4.57 10.25 4 9 4 6.79 4 5 5.79 5 8"/></svg>;
    case 'wifi': return <svg {...b}><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>;
    case 'add': return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>;
    case 'link': return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
    case 'share': return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;
    case 'give': return <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>;
    default: return null;
  }
}

  );
}

/* =============================================
   PLAN GROUP (ACCORDION)
   ============================================= */
function PlanGroup({ title, plans, compareList, toggleCompare, onOpen, isOpen, onToggle, groupRef, recoId }) {
  const [filter, setFilter] = useState('all');

  const filtered = useMemo(() => {
    let list = plans;
    if (filter === 'unlimit') list = list.filter(p => p.isUnlimited);
    if (filter === 'limit')   list = list.filter(p => !p.isUnlimited);
    return [...list].sort((a, b) => {
      const aReco = `${a.familyName}_${a.price}` === recoId ? 0 : 1;
      const bReco = `${b.familyName}_${b.price}` === recoId ? 0 : 1;
      if (aReco !== bReco) return aReco - bReco;
      return a.price - b.price;
    });
  }, [plans, filter, recoId]);

  // totalGB 기준으로 서브 그룹화 → 같은 데이터량끼리 한 행에, 열 = 가격 비교
  const dataGroups = useMemo(() => {
    const map = new Map();
    filtered.forEach(p => {
      const tgb = p.dataVolume + calculatePromoGB(p.familyName, p.dataVolume);
      if (!map.has(tgb)) map.set(tgb, []);
      map.get(tgb).push(p);
    });
    return Array.from(map.entries())
      .sort(([a, aPlans], [b, bPlans]) => {
        const aHasReco = aPlans.some(p => `${p.familyName}_${p.price}` === recoId);
        const bHasReco = bPlans.some(p => `${p.familyName}_${p.price}` === recoId);
        if (aHasReco && !bHasReco) return -1;
        if (!aHasReco && bHasReco) return 1;
        return a - b;
      })
      .map(([tgb, groupPlans]) => ({ tgb, groupPlans }));
  }, [filtered, recoId]);

  if (plans.length === 0) return null;

  return (
    <div className="plan-group" ref={groupRef}>
      <div className="pg-header-row" onClick={onToggle}>
        <div className="pg-header-left">
          <h2 className="pg-title">{title}</h2>
          <span className="pg-count-badge">{plans.length}개</span>
        </div>
        <svg className="pg-chevron" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2"
          style={{transform: isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}}>
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </div>
      {isOpen && (
        <div className="pg-content">
          <div className="pg-tabs">
            <button className={`pg-tab ${filter==='all'?'active':''}`} onClick={e=>{e.stopPropagation();setFilter('all');}}>전체</button>
            <button className={`pg-tab ${filter==='unlimit'?'active':''}`} onClick={e=>{e.stopPropagation();setFilter('unlimit');}}>데이터 무제한</button>
            <button className={`pg-tab ${filter==='limit'?'active':''}`} onClick={e=>{e.stopPropagation();setFilter('limit');}}>용량 제한</button>
          </div>
          {filtered.length === 0
            ? <div style={{padding:'40px 0',color:'#bbb',fontSize:14}}>해당 조건의 요금제가 없습니다.</div>
            : dataGroups.map(({ tgb, groupPlans }) => (
              <div key={tgb} className="pg-data-group">
                <div className="pg-data-label">
                  {tgb}GB{groupPlans[0]?.isUnlimited ? '+' : ''}
                  <span className="pg-data-count">{groupPlans.length}개 요금제</span>
                </div>
                <div className="plan-grid">
                  {groupPlans.map(p => (
                    <PlanCard key={`${p.familyName}_${p.price}`} plan={p}
                      isAdded={compareList.some(c => c.familyName === p.familyName && c.price === p.price)}
                      onToggle={() => toggleCompare(p)}
                      isRecommended={`${p.familyName}_${p.price}` === recoId}
                      onOpen={onOpen} />
                  ))}
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

function App() {
  const pageEntryTime = React.useRef(Date.now());
  const [network, setNetwork] = useState('lte');
  const [intent, setIntent] = useState('데이터 위주');
  const [openGroups, setOpenGroups] = useState({ '11~29GB': true });
  const refA = React.useRef(null);
  const refB = React.useRef(null);
  const refC = React.useRef(null);
  const refD = React.useRef(null);
  const refE = React.useRef(null);
  const groupRefs = { '10GB 이하': refA, '11~29GB': refB, '30GB': refC, '31~99GB': refD, '100GB+': refE };
  const [compareList, setCompareList] = useState([]);
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResult, setSearchResult] = useState('');
  const [modalPlan, setModalPlan] = useState(null);

  useEffect(() => {
    if (modalPlan) document.body.style.overflow = 'hidden';
    else document.body.style.overflow = 'unset';
    return () => { document.body.style.overflow = 'unset'; }
  }, [modalPlan]);

  const handleSearch = (e) => {
    e.preventDefault();
    const q = searchQuery.trim().replace(/\s+/g, '');
    if (q.includes('아무나solo결합') || q.includes('아무나솔로결합')) {
      setSearchResult('아무나 SOLO결합은 혼자서도 결합가능한 kt m 모바일의 결합할인 상품입니다.');
    } else if (q.length > 0) {
      setSearchResult('현재는 "아무나 SOLO 결합"에 대한 답변만 준비되어 있습니다.');
    } else {
      setSearchResult('');
    }
  };

  // 데이터 정규화 (변형 병합)
  const normalizedPlans = useMemo(() => {
    const map = new Map();
    RAW_PLANS.forEach(p => {
      const key = `${p.price}_${p.dataVolume}_${p.isUnlimited}`;
      if (!map.has(key)) {
        map.set(key, { ...p, variants: [...(p.variants || [])] });
      } else {
        map.get(key).variants.push(...(p.variants || []));
      }
    });
    return Array.from(map.values());
  }, []);

  // 필터 파이프라인 (네트워크 + 의도 필터 → flat list)
  const { allPlans, recoId } = useMemo(() => {
    let list = normalizedPlans;

    list = list.filter(p => network === '5g' ? p.familyName.includes('5G') : !p.familyName.includes('5G'));

    if (intent === '최저가') {
      const sorted = [...list].sort((a, b) => a.price - b.price);
      const threshold = sorted[Math.floor(sorted.length * 0.3)]?.price || Infinity;
      list = list.filter(p => p.price <= threshold);
    } else {
      list = list.filter(p => {
        const cls = classifyPlan(p);
        if (intent === '데이터 위주') return cls === 'general' || cls === '5g';
        if (intent === '통화 포함') return cls === 'voice' || p.familyName.includes('통화');
        if (intent === '시니어/복지') return cls === 'senior' || cls === 'welfare';
        if (intent === '키즈') return cls === 'kids';
        return true;
      });
    }

    const unlimitedAll = list.filter(p => p.isUnlimited);
    let recoId = null;
    if (unlimitedAll.length > 0) {
      let best = unlimitedAll[0];
      let maxVal = Math.max(...best.variants.map(v => v.giftTotalValue || 0));
      unlimitedAll.forEach(p => {
        const val = Math.max(...p.variants.map(v => v.giftTotalValue || 0));
        if (val > maxVal || (val === maxVal && p.price < best.price)) { best = p; maxVal = val; }
      });
      recoId = `${best.familyName}_${best.price}`;
    }

    return { allPlans: list, recoId };
  }, [normalizedPlans, network, intent]);

  const totalGB = (p) => p.dataVolume + calculatePromoGB(p.familyName, p.dataVolume);
  const groupA = allPlans.filter(p => totalGB(p) <= 10);
  const groupB = allPlans.filter(p => { const t = totalGB(p); return t >= 11 && t <= 29; });
  const groupC = allPlans.filter(p => totalGB(p) === 30);
  const groupD = allPlans.filter(p => { const t = totalGB(p); return t >= 31 && t <= 99; });
  const groupE = allPlans.filter(p => totalGB(p) >= 100);

  function handleNavClick(key) {
    setOpenGroups(prev => ({ ...prev, [key]: true }));
    setTimeout(() => { groupRefs[key]?.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 80);
  }

  const toggleCompare = (plan) => {
    setCompareList(prev => {
      const exists = prev.find(p => p.familyName === plan.familyName && p.price === plan.price);
      if (exists) { window.dataLayer=window.dataLayer||[]; window.dataLayer.push({event:'plan_compare_remove',plan_name:plan.familyName,price:plan.price}); return prev.filter(p => !(p.familyName === plan.familyName && p.price === plan.price)); }
      
      if (prev.length >= 3) {
        alert('비교함은 최대 3개까지만 담을 수 있습니다.');
        return prev;
      }
      window.dataLayer=window.dataLayer||[]; window.dataLayer.push({event:'plan_compare_add',plan_name:plan.familyName,price:plan.price}); return [...prev, plan];
    });
  };

  // 비교함 형광펜 하이라이트 계산
  const compareStats = useMemo(() => {
    if (compareList.length < 2) return { minPrice: null, maxData: null };
    const prices = compareList.map(p => p.price);
    const datas = compareList.map(p => p.dataVolume + calculatePromoGB(p.familyName, p.dataVolume));
    return { minPrice: Math.min(...prices), maxData: Math.max(...datas) };
  }, [compareList]);

  return (
    <div className="app-container">
      <header className="kt-page-title-wrap">
        <div className="kt-bcrumb"><span>홈</span> › <span>요금제</span> › <span className="cur">비교</span></div>
        <h1 className="kt-page-title">요금제 한눈에 비교하기</h1>
        <p className="kt-page-sub">나에게 딱 맞는 데이터와 혜택을 찾아보세요.</p>
      </header>

      <div className="kt-layout">
        <main className="kt-main">
          {/* 상단 탭 */}
          <div className="network-tabs">
            <button className={`network-tab ${network === 'lte' ? 'active' : ''}`} onClick={() => setNetwork('lte')}>LTE 요금제</button>
            <button className={`network-tab ${network === '5g' ? 'active' : ''}`} onClick={() => setNetwork('5g')}>5G 요금제</button>
          </div>

          {/* 데이터 구간 빠른 이동 — sticky (LTE/5G 탭 아래) */}
          <div className="usage-filter-wrap">
            <div className="usage-filter-logo">
              <div className="usage-filter-logo-sq">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="4" fill="#E60012"/><text x="4" y="14" font-size="10" font-weight="800" fill="white" font-family="sans-serif">M</text></svg>
              </div>
            </div>
            {['10GB 이하', '11~29GB', '30GB', '31~99GB', '100GB+'].map(key => (
              <button key={key} className={`usage-chip ${openGroups[key] ? 'active' : ''}`}
                onClick={() => { handleNavClick(key); window.dataLayer=window.dataLayer||[]; window.dataLayer.push({event:'plan_nav_section',value:key}); }}>
                {key}
              </button>
            ))}
          </div>

          {/* 1단계 의도 필터 */}
          <div className="intent-filter-wrap">
            {['데이터 위주', '통화 포함', '최저가', '시니어/복지', '키즈'].map(tab => (
              <button key={tab} className={`intent-pill ${intent === tab ? 'active' : ''}`} onClick={() => { setIntent(tab); window.dataLayer=window.dataLayer||[]; window.dataLayer.push({event:'plan_filter_intent',value:tab}); }}>{tab}</button>
            ))}
          </div>

          {/* 아코디언 그룹 */}
          <div>
            <PlanGroup title="10GB 이하" plans={groupA} compareList={compareList} toggleCompare={toggleCompare}
              onOpen={setModalPlan} isOpen={!!openGroups['10GB 이하']} recoId={recoId}
              onToggle={() => setOpenGroups(prev => ({...prev, '10GB 이하': !prev['10GB 이하']}))}
              groupRef={refA} />
            <PlanGroup title="11~29GB" plans={groupB} compareList={compareList} toggleCompare={toggleCompare}
              onOpen={setModalPlan} isOpen={!!openGroups['11~29GB']} recoId={recoId}
              onToggle={() => setOpenGroups(prev => ({...prev, '11~29GB': !prev['11~29GB']}))}
              groupRef={refB} />
            <PlanGroup title="30GB" plans={groupC} compareList={compareList} toggleCompare={toggleCompare}
              onOpen={setModalPlan} isOpen={!!openGroups['30GB']} recoId={recoId}
              onToggle={() => setOpenGroups(prev => ({...prev, '30GB': !prev['30GB']}))}
              groupRef={refC} />
            <PlanGroup title="31~99GB" plans={groupD} compareList={compareList} toggleCompare={toggleCompare}
              onOpen={setModalPlan} isOpen={!!openGroups['31~99GB']} recoId={recoId}
              onToggle={() => setOpenGroups(prev => ({...prev, '31~99GB': !prev['31~99GB']}))}
              groupRef={refD} />
            <PlanGroup title="100GB+" plans={groupE} compareList={compareList} toggleCompare={toggleCompare}
              onOpen={setModalPlan} isOpen={!!openGroups['100GB+']} recoId={recoId}
              onToggle={() => setOpenGroups(prev => ({...prev, '100GB+': !prev['100GB+']}))}
              groupRef={refE} />
          </div>
        </main>

        <aside className="kt-side">
          <div className="comp-intro-label">요금제간 차이를 알려드려요!</div>
          <div className="comp-board">
            <div className="comp-header">
              <span className="comp-title">비교함</span>
              <span className="comp-count"><span style={{color: 'var(--color-primary)'}}>{compareList.length}</span> / 3</span>
            </div>
            
            <div className="comp-slots">
              {[0, 1, 2].map(i => {
                const item = compareList[i];
                if (!item) return <div key={i} className="comp-slot empty"><div style={{fontSize: '20px', marginBottom: '4px'}}>+</div> 추가</div>;
                
                const promoGB = calculatePromoGB(item.familyName, item.dataVolume);
                const totalGB = item.dataVolume + promoGB;
                const { speedAfter } = parseDataRaw(item.dataRaw);
                const callBasic = parseCallBasic(item.familyName);
                const uniqueBenefits = [...new Set(item.variants.map(v => BENEFIT_NORMALIZE[v.benefitLabel]).filter(Boolean))];

                const isBestData = compareList.length > 1 && totalGB === compareStats.maxData;
                const isBestPrice = compareList.length > 1 && item.price === compareStats.minPrice;

                return (
                  <div key={i} className="comp-slot">
                    <button className="cs-del-btn" onClick={() => toggleCompare(item)}>✕</button>
                    <div className="cs-info">
                      
                      {/* 데이터 */}
                      <div className="cs-row">
                        <span className="cs-label">데이터</span>
                        <div className="cs-data">
                          <span className={isBestData ? 'highlight-marker' : ''}>{totalGB}GB</span>
                        </div>
                      </div>

                      {/* 가격 */}
                      <div className="cs-row">
                        <span className="cs-label">월 납부액</span>
                        <div className="cs-price">
                          <span className={isBestPrice ? 'highlight-marker' : ''}>{item.price.toLocaleString()}원</span>
                        </div>
                      </div>

                      {/* 속도 & 통화 */}
                      <div className="cs-row" style={{gap: '6px', margin: '8px 0'}}>
                        <div className="cs-speed">전송: {speedAfter ? speedAfter : (item.isUnlimited ? "무제한" : "차단")}</div>
                        <div className="cs-call">통화: {callBasic}</div>
                      </div>

                      {/* 제휴 혜택 */}
                      {uniqueBenefits.length > 0 && (
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">제휴 혜택</span>
                          <span className="cs-extra-val">{uniqueBenefits.join(' · ')}</span>
                        </div>
                      )}

                      {/* 추가 비교 항목 (하드코딩) */}
                      <div className="cs-extra-section">
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">아무나 SOLO결합</span>
                          <span className="cs-extra-val cs-extra-good">월 5,000원↓</span>
                        </div>
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">아무나 가족결합+</span>
                          <span className="cs-extra-val cs-extra-good">최대 월 15,000원↓</span>
                        </div>
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">데이터쉐어링</span>
                          <span className={`cs-extra-val ${item.isUnlimited ? 'cs-extra-good' : 'cs-extra-na'}`}>
                            {item.isUnlimited ? '무료 제공' : '미지원'}
                          </span>
                        </div>
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">KT 인터넷 결합</span>
                          <span className="cs-extra-val cs-extra-good">트리플 할인 가능</span>
                        </div>
                        <div className="cs-extra-row">
                          <span className="cs-extra-label">부가서비스</span>
                          <span className="cs-extra-val">후후·T전화·로밍 등</span>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="comp-action">
              <form className="comp-search-wrap" onSubmit={handleSearch}>
                <div className="comp-search-input-box">
                  <input 
                    type="text" 
                    className="comp-search-input" 
                    placeholder="모르는 내용은 물어보세요" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                  <button type="submit" className="comp-search-btn">🔍</button>
                </div>
                {searchResult && (
                  <div className="comp-search-result">
                    {searchResult}
                  </div>
                )}
              </form>
            </div>
          </div>
        </aside>
      </div>

      {/* 모달(상세 페이지) 컴포넌트 렌더링 */}
      {modalPlan && <PlanModal plan={modalPlan} onClose={() => setModalPlan(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
