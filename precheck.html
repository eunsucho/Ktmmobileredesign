<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KT M mobile - 가입조건 선택</title>

  <!-- Tailwind CSS CDN (JIT, supports arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pretendard Font -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { margin: 0; background: #fff; }
    mark { background-color: rgba(253, 224, 71, 0.55); padding: 0 2px; border-radius: 2px; }
    input[type="file"] { display: none; }
    :focus { outline: none; }
  </style>
</head>
<body>
  <script>window.KMNAV_ACTIVE = '가입하기';</script>
  <script src="shared-nav.js"></script>
  <div id="nav-mount"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ──────────────────────────────────────────
       이미지 placeholder (원본: image-5.png / image-8.png)
       실제 파일을 같은 폴더에 두면 src를 바꿔 사용하세요.
    ────────────────────────────────────────── */
    function PrepareImage() {
      return (
        <div style={{
          background: 'linear-gradient(135deg, #f0f9ff 0%, #f0faf9 100%)',
          border: '2px dashed #00B5A5',
          borderRadius: '12px',
          padding: '48px 24px',
          textAlign: 'center',
          color: '#666',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center',
          gap: '12px',
          minHeight: '200px'
        }}>
          <div style={{ fontSize: '52px' }}>🪪</div>
          <div style={{ fontSize: '15px', fontWeight: 700, color: '#333' }}>신분증과 계좌/신용카드를 준비해주세요!</div>
          <div style={{ fontSize: '12px', color: '#999' }}>(신분증 및 카드 준비 안내 이미지 – image-5.png)</div>
        </div>
      );
    }

    function EsimGuideImage() {
      return (
        <div style={{
          background: '#f8f8f8',
          border: '1px dashed #ccc',
          borderRadius: '8px',
          padding: '32px 16px',
          textAlign: 'center',
          color: '#999',
          fontSize: '12px',
          marginBottom: '16px'
        }}>
          (이미지 가이드 – image-8.png)
        </div>
      );
    }

    /* ──────────────────────────────────────────
       메인 App 컴포넌트
    ────────────────────────────────────────── */
    function App() {
      const [customerType, setCustomerType] = useState('domestic');
      const [activationMethod, setActivationMethod] = useState(null);
      const [activationType, setActivationType] = useState('usim-have');
      const [subscriptionType, setSubscriptionType] = useState('transfer');
      const [deliveryType, setDeliveryType] = useState('same-day');
      const [eventCode, setEventCode] = useState('');
      const [showBenefitDetails, setShowBenefitDetails] = useState({ mobile: true, internet: false, extra: false });
      const [ktInternet, setKtInternet] = useState('none');
      const [selectedCard, setSelectedCard] = useState('none');
      const [tempSelectedCard, setTempSelectedCard] = useState('none');
      const [showCardModal, setShowCardModal] = useState(false);
      const [cardAgreement, setCardAgreement] = useState(false);
      const [showHelp, setShowHelp] = useState(true);
      const [showImageGuideModal, setShowImageGuideModal] = useState(false);
      const [showUsimValidModal, setShowUsimValidModal] = useState(false);
      const [showEsimGuidePanel, setShowEsimGuidePanel] = useState(false);
      const [showEsimConfirmModal, setShowEsimConfirmModal] = useState(false);
      const [showMemberCheckModal, setShowMemberCheckModal] = useState(true);
      const [showPrepareModal, setShowPrepareModal] = useState(false);
      const [phoneModel, setPhoneModel] = useState('');
      const [eid, setEid] = useState('');
      const [imei1, setImei1] = useState('');
      const [imei2, setImei2] = useState('');

      const handleCardSelect = (card) => {
        if (card !== 'none') {
          setTempSelectedCard(card);
          setShowCardModal(true);
          setCardAgreement(false);
        } else {
          setSelectedCard(card);
        }
      };

      const handleCardConfirm = () => {
        if (cardAgreement) {
          setSelectedCard(tempSelectedCard);
          setShowCardModal(false);
        }
      };

      const handleNonMemberSignup = () => setShowMemberCheckModal(false);
      const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

      return (
        <div className="min-h-screen bg-white">

          {/* ── Header ── */}
          <header className="bg-white border-b border-gray-200">
            <div className="max-w-[1200px] mx-auto px-6 py-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-8">
                  <div className="flex items-center gap-1">
                    <span style={{ color: '#E60012', fontWeight: 700, fontSize: '24px' }}>kt</span>
                    <span style={{ fontWeight: 700, fontSize: '20px', marginLeft: '4px' }}>M mobile</span>
                  </div>
                  <nav className="flex gap-6 text-sm">
                    {['가입하기','상품','혜택','결합','고객센터'].map(m => (
                      <a key={m} href="#" className="text-gray-600 hover:text-gray-900">{m}</a>
                    ))}
                  </nav>
                  <div className="px-3 py-1 bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-200 rounded-full text-xs text-purple-700">
                    트리플할인
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex gap-3 text-xs text-gray-500">
                    {['교체 유심 신청','신청조회','마이페이지'].map(l => (
                      <a key={l} href="#" className="hover:text-gray-700">{l}</a>
                    ))}
                  </div>
                  <button style={{ border: '1px solid #E60012', color: '#E60012', padding: '6px 16px', borderRadius: '4px', fontSize: '14px', background: 'transparent', cursor: 'pointer' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#fff5f5'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    로그인
                  </button>
                </div>
              </div>
            </div>
          </header>

          {/* ── Page Title ── */}
          <div className="max-w-[1200px] mx-auto px-6 py-6 border-b border-gray-100">
            <h1 style={{ fontSize: '22px', fontWeight: 700, color: '#111' }}>가입조건 선택</h1>
          </div>

          {/* ── Main Form ── */}
          <div className="max-w-[1200px] mx-auto px-6 pb-24">
            <div style={{ display: 'flex', flexDirection: 'column', gap: '32px', paddingTop: '24px' }}>

              {/* ── 고객유형 ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 600, color: '#111', paddingTop: '12px', fontSize: '16px' }}>고객유형</label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '12px' }}>
                    {[
                      { value: 'domestic', icon: '19+', label: '내국인' },
                      { value: 'minor',    icon: '19-', label: '미성년자(19세 미만)' },
                      { value: 'foreigner',icon: '🌐',  label: '외국인 (Foreigner)' }
                    ].map(item => (
                      <button key={item.value} onClick={() => setCustomerType(item.value)}
                        style={{
                          padding: '12px 16px', borderRadius: '8px', border: customerType === item.value ? '1px solid #00B5A5' : '1px solid #e5e7eb',
                          background: customerType === item.value ? '#F0FAF9' : '#fff',
                          display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer', transition: 'all .15s'
                        }}>
                        <div style={{ width: '28px', height: '28px', borderRadius: '50%', background: '#f3f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', flexShrink: 0 }}>
                          {item.icon}
                        </div>
                        <span style={{ fontSize: '14px', flex: 1, textAlign: 'left' }}>{item.label}</span>
                        {customerType === item.value && <span style={{ color: '#00B5A5', fontSize: '14px' }}>✓</span>}
                      </button>
                    ))}
                  </div>
                  <p style={{ fontSize: '12px', color: '#6b7280', lineHeight: '1.6' }}>
                    {customerType === 'domestic' && '성인(19세 이상 내국인)은 셀프개통과 상담사 개통신청 모두 가능합니다.'}
                    {customerType === 'minor' && '미성년자(19세 미만 내국인)는 상담사 개통 신청만 가능합니다. 가입신청서 작성 완료 후, 법정대리인에게 순차적으로 연락하여 개통 안내를 드립니다.'}
                    {customerType === 'foreigner' && '외국인은 상담사 개통신청만 가능합니다. 가입신청서 작성 완료 후, 순차적으로 연락하여 개통 안내를 드립니다. (안내는 한국어, 영어, 중국어로 제공됩니다.)'}
                  </p>
                </div>
              </section>

              {/* ── 개통유형1 (셀프/상담사) ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 500, color: '#000', paddingTop: '14px', fontSize: '16px' }}>개통 유형</label>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                  {[
                    { value: 'self', label: '셀프 개통' },
                    { value: 'consultant', label: '상담사 개통' }
                  ].map(item => (
                    <button key={item.value} onClick={() => setActivationMethod(item.value)}
                      style={{
                        height: '44px', borderRadius: '12px',
                        border: activationMethod === item.value ? '2px solid #4ECDC4' : '1px solid #E0E0E0',
                        background: activationMethod === item.value ? '#F0FAF9' : '#fff',
                        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
                        fontSize: '14px', fontWeight: 500, cursor: 'pointer', transition: 'all .15s',
                        color: activationMethod === item.value ? '#111' : '#555'
                      }}>
                      {item.label}
                      {activationMethod === item.value && <span style={{ color: '#4ECDC4', fontWeight: 700 }}>✓</span>}
                    </button>
                  ))}
                </div>
              </section>

              {/* ── SIM 유형 ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 600, color: '#111', paddingTop: '12px', fontSize: '16px' }}>SIM 유형</label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                    {[
                      { value: 'usim-have', label: 'USIM' },
                      { value: 'esim',      label: 'ESIM' }
                    ].map(item => (
                      <button key={item.value} onClick={() => setActivationType(item.value)}
                        style={{
                          height: '44px', borderRadius: '12px',
                          border: activationType === item.value ? '1px solid #00B5A5' : '1px solid #e5e7eb',
                          background: activationType === item.value ? '#F0FAF9' : '#fff',
                          color: activationType === item.value ? '#00B5A5' : '#555',
                          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
                          fontSize: '14px', cursor: 'pointer', transition: 'all .15s'
                        }}>
                        {item.label}
                        {activationType === item.value && <span style={{ fontSize: '14px' }}>✓</span>}
                      </button>
                    ))}
                  </div>

                  {/* USIM 선택 시 */}
                  {activationType === 'usim-have' && (
                    <p style={{ fontSize: '12px', color: '#6b7280' }}>유심 구매처: 다이렉트몰, 편의점/마트, 오픈마켓</p>
                  )}

                  {/* eSIM 선택 시 */}
                  {activationType === 'esim' && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                      <div style={{ fontSize: '12px', color: '#6b7280', lineHeight: '1.7', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                        <p>• 한 휴대폰에서 2회선 이용 시, 메인회선과 서브회선이 동일 명의가 아닐 경우 이용에 제약이 있을 수 있습니다.</p>
                        <p>• 외국인, 미성년자는 셀프개통이 불가하므로 '상담사 개통 신청'을 이용 바랍니다.</p>
                        <p>• 개통이 잘 안되시거나 어려운 부분이 있으시면 평일 09:00 ~ 18:00 고객센터(1899-5000/유료)로 연락 부탁드립니다.</p>
                        <p>• eSIM 개통을 위해서는 EID 등록이 선행되어야 하며, IMEI 및 32자리 EID 캡쳐화면 이미지 업로드가 필요합니다.</p>
                        <p>
                          • 이미지 업로드 시 자동으로 입력됩니다.{' '}
                          <button onClick={() => setShowEsimGuidePanel(true)}
                            style={{ color: '#00B5A5', textDecoration: 'underline', background: 'none', border: 'none', cursor: 'pointer', fontSize: '12px', padding: 0 }}>
                            이미지 가이드 보기
                          </button>
                        </p>
                      </div>

                      <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr', gap: '16px', alignItems: 'start' }}>
                        <label style={{ fontSize: '12px', fontWeight: 500, color: '#374151', paddingTop: '12px' }}>휴대폰 정보 등록</label>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                          {[
                            { val: phoneModel, set: setPhoneModel, ph: '휴대폰 모델명' },
                            { val: eid,        set: setEid,        ph: 'EID', max: 32 },
                            { val: imei1,      set: setImei1,      ph: 'IMEI1' },
                            { val: imei2,      set: setImei2,      ph: 'IMEI2' },
                          ].map((f, i) => (
                            <input key={i} type="text" value={f.val}
                              onChange={e => f.set(e.target.value)}
                              placeholder={f.ph} maxLength={f.max}
                              style={{ height: '44px', padding: '0 12px', border: '1px solid #d1d5db', borderRadius: '8px', fontSize: '14px', width: '100%', boxSizing: 'border-box' }}
                              onFocus={e => e.target.style.borderColor = '#00B5A5'}
                              onBlur={e => e.target.style.borderColor = '#d1d5db'} />
                          ))}
                        </div>
                      </div>

                      <div style={{ display: 'flex', justifyContent: 'center' }}>
                        <input type="file" accept="image/*" id="esim-image-upload"
                          onChange={e => {
                            if (e.target.files && e.target.files[0]) {
                              setShowEsimConfirmModal(true);
                              setPhoneModel('아이폰12미니-256');
                              setEid('89044452175923879469136765827398');
                              setImei1('352958772864489');
                              setImei2('352682930948978');
                            }
                          }} />
                        <label htmlFor="esim-image-upload"
                          style={{ width: '360px', height: '44px', background: '#00B5A5', color: '#fff', borderRadius: '8px', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                          이미지 등록
                        </label>
                      </div>
                    </div>
                  )}
                </div>
              </section>

              {/* ── 가입유형 ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 600, color: '#111', paddingTop: '12px', fontSize: '16px' }}>가입 유형</label>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                  {[
                    { value: 'transfer', title: '번호이동', sub: '쓰던번호 그대로' },
                    { value: 'new',      title: '신규가입', sub: '새로운 번호로' }
                  ].map(item => (
                    <button key={item.value} onClick={() => setSubscriptionType(item.value)}
                      style={{
                        padding: '14px 16px', borderRadius: '8px',
                        border: subscriptionType === item.value ? '1px solid #00B5A5' : '1px solid #e5e7eb',
                        background: subscriptionType === item.value ? '#F0FAF9' : '#fff',
                        cursor: 'pointer', transition: 'all .15s', textAlign: 'center'
                      }}>
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '4px', marginBottom: '4px' }}>
                        <span style={{ fontSize: '14px', fontWeight: 600 }}>{item.title}</span>
                        {subscriptionType === item.value && <span style={{ color: '#00B5A5', fontSize: '14px' }}>✓</span>}
                      </div>
                      <p style={{ fontSize: '12px', color: '#6b7280', margin: 0 }}>{item.sub}</p>
                    </button>
                  ))}
                </div>
              </section>

              {/* ── 요금제 선택 ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 600, color: '#111', paddingTop: '12px', fontSize: '15px' }}>요금제 선택</label>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <div style={{ flex: 1, padding: '20px', background: 'linear-gradient(135deg, rgba(240,250,249,.5) 0%, rgba(240,253,250,.5) 100%)', borderRadius: '8px', border: '1px solid #ccf0ee' }}>
                    <h3 style={{ fontSize: '16px', fontWeight: 600, color: '#111', marginBottom: '12px', marginTop: 0 }}>모두다 맘껏 15GB+(PAY쿠폰 5000P)</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
                        <span style={{ padding: '2px 10px', background: '#00B5A5', color: '#fff', borderRadius: '999px', fontSize: '12px' }}>
                          최대 35GB무제한
                        </span>
                        <span style={{ fontSize: '12px', color: '#4b5563' }}>
                          15GB+최대1Mbps +10GB(아무나SOLO경험) + 데이터 추가제공 10GB(24개월)
                        </span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '12px', fontSize: '12px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                          <span>📞</span>
                          <span style={{ fontWeight: 500 }}>기본제공</span>
                          <span style={{ color: '#6b7280' }}>+영상/부가통화 300분</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                          <span>📧</span>
                          <span style={{ fontWeight: 500 }}>기본제공</span>
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ padding: '2px 10px', background: '#f3f4f6', color: '#374151', borderRadius: '999px', fontSize: '12px' }}>[추가혜택]</span>
                        <span style={{ fontSize: '12px', color: '#4b5563' }}>네이버페이 5,000P(매월 제공)</span>
                      </div>
                    </div>
                  </div>
                  <button style={{
                    width: '160px', minHeight: '140px', border: '1px dashed #d1d5db', borderRadius: '8px',
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '8px',
                    background: '#fff', cursor: 'pointer', transition: 'border-color .15s', flexShrink: 0
                  }}>
                    <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: '#f3f4f6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px' }}>+</div>
                    <span style={{ fontSize: '12px', color: '#4b5563' }}>다른 요금제 고르기</span>
                  </button>
                </div>
              </section>

              {/* ── 이벤트 코드 ── */}
              <section style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: '24px', alignItems: 'start' }}>
                <label style={{ fontWeight: 600, color: '#111', paddingTop: '12px', fontSize: '16px' }}>이벤트 코드</label>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  <p style={{ fontSize: '12px', color: '#6b7280', margin: 0 }}>해당 요금제는 이벤트 코드 적용이 가능합니다. 이벤트에서 확인한 코드가 있다면 입력해 주세요.</p>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <input type="text" value={eventCode} onChange={e => setEventCode(e.target.value)}
                      placeholder="이벤트 코드 입력"
                      style={{ flex: 1, height: '44px', padding: '0 16px', border: '1px solid #d1d5db', borderRadius: '8px', fontSize: '14px', boxSizing: 'border-box', display: 'block' }}
                      onFocus={e => e.target.style.borderColor = '#00B5A5'}
